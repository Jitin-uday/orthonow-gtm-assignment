<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrthoNow Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OrthoNow Appointment Booking</h1>

<div id="step1">
    <h2>Step 1</h2>

    <select id="clinic">
        <option>Delhi Clinic</option>
        <option>Noida Clinic</option>
        <option>Gurgaon Clinic</option>
    </select>

    <select id="specialty">
        <option>Orthopedics</option>
        <option>Sports Injury</option>
    </select>

    <button onclick="step1()">Next</button>
</div>

<div id="step2" class="hidden">

    <h2>Step 2</h2>

    <input id="name" placeholder="Name">

    <input id="phone" placeholder="Phone">

    <input id="date" type="date">

    <button onclick="step2()">Next</button>

</div>

<div id="step3" class="hidden">

<h2>Confirm Booking</h2>

<button onclick="confirmBooking()">Confirm Appointment</button>

</div>

<hr>

<a href="tel:+911234567890" onclick="callNow()">📞 Call Now</a>

<br><br>

<a href="https://wa.me/911234567890" target="_blank" onclick="whatsapp()">WhatsApp</a>

<br><br>

<form onsubmit="downloadGuide(event)">
<input placeholder="Name">
<input placeholder="Phone">
<button>Download Patient Guide</button>
</form>

<script src="script.js"></script>

</body>
</html>
